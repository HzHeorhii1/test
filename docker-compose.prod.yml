services:
  iam:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
      args:
        SERVICE_NAME: iam
    environment:
      SERVICE_NAME: iam
      NODE_ENV: production
      IAM_REST_PORT: 3001
      IAM_GRPC_PORT: 5001
      IAM_JWT_SECRET: ${IAM_JWT_SECRET}
      IAM_JWT_EXPIRES_IN: ${IAM_JWT_EXPIRES_IN:-3600}
      DATABASE_URL_IAM: ${DATABASE_URL_IAM}
      NOTIFY_GRPC_HOST: notify
      NOTIFY_GRPC_PORT_INTERNAL: 5002
    ports:
      - '3001:3001'
      - '5001:5001'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3001/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  notify:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
      args:
        SERVICE_NAME: notify
    environment:
      SERVICE_NAME: notify
      NODE_ENV: production
      NOTIFY_REST_PORT: 3002
      NOTIFY_GRPC_PORT: 5002
      DATABASE_URL_NOTIFY: ${DATABASE_URL_NOTIFY}
      IAM_GRPC_HOST: iam
      IAM_GRPC_PORT_INTERNAL: 5001
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - '3002:3002'
      - '5002:5002'
    depends_on:
      db:
        condition: service_healthy
      iam:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3002/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  redis_data:
